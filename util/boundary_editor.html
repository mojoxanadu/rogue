<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Background Boundary Editor — MacPaint Style</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #c0c0c0; font-family: 'Chicago', 'Monaco', monospace; font-size: 12px; overflow: hidden; }
#menu-bar { background: #c0c0c0; border-bottom: 2px solid #000; padding: 2px 8px; display: flex; gap: 16px; align-items: center; }
#menu-bar span { font-weight: bold; cursor: pointer; padding: 1px 4px; }
#menu-bar span:hover { background: #000; color: #fff; }
#app { display: flex; height: calc(100vh - 24px); }
#toolbox { width: 52px; background: #c0c0c0; border-right: 2px solid #000; padding: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.tool-btn { width: 22px; height: 22px; background: #c0c0c0; border: 2px outset #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.tool-btn.active { border: 2px inset #888; background: #aaa; }
#canvas-area { flex: 1; overflow: hidden; position: relative; background: #808080; display: flex; align-items: center; justify-content: center; }
#editor-canvas { cursor: crosshair; image-rendering: pixelated; }
#right-panel { width: 180px; background: #c0c0c0; border-left: 2px solid #000; padding: 6px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
.panel-section { border: 2px inset #888; padding: 4px; }
.panel-title { font-weight: bold; font-size: 10px; text-transform: uppercase; margin-bottom: 4px; border-bottom: 1px solid #888; }
select, button, input { font-family: inherit; font-size: 11px; background: #c0c0c0; border: 2px outset #fff; cursor: pointer; width: 100%; margin-top: 2px; padding: 2px 4px; }
button:active { border-style: inset; }
#status-bar { position: absolute; bottom: 0; left: 52px; right: 180px; background: #c0c0c0; border-top: 2px solid #000; padding: 2px 8px; font-size: 11px; }
.color-swatch { width: 20px; height: 20px; border: 2px solid #000; display: inline-block; cursor: pointer; }
#pattern-palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 4px; }
.pattern-swatch { width: 24px; height: 24px; border: 2px solid #888; cursor: pointer; image-rendering: pixelated; }
.pattern-swatch.active { border: 2px solid #000; }
#npc-list { font-size: 10px; }
.npc-item { padding: 2px 4px; cursor: pointer; border-bottom: 1px solid #999; display: flex; justify-content: space-between; }
.npc-item:hover { background: #aaa; }
.npc-item.selected { background: #000; color: #fff; }
</style>
</head>
<body>

<div id="menu-bar">
  <span style="font-weight:bold">🎨 Boundary Editor</span>
  <span onclick="newFile()">File</span>
  <span onclick="showHelp()">Help</span>
  <span id="current-scene-label" style="color:#444; font-size:11px;">No image loaded</span>
</div>

<div id="app">
  <!-- Toolbox -->
  <div id="toolbox">
    <div class="tool-btn active" id="tool-pencil" onclick="setTool('pencil')" title="Pencil — draw walkable tiles">✏️</div>
    <div class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser — mark as wall/blocked">🧹</div>
    <div class="tool-btn" id="tool-npc" onclick="setTool('npc')" title="Place NPC starting position">👤</div>
    <div class="tool-btn" id="tool-patrol" onclick="setTool('patrol')" title="Draw NPC patrol path">🔄</div>
    <div class="tool-btn" id="tool-foreground" onclick="setTool('foreground')" title="Mark foreground (avatar walks behind)">🌿</div>
    <div class="tool-btn" id="tool-fill" onclick="setTool('fill')" title="Flood fill">🪣</div>
    <div class="tool-btn" id="tool-zoom-in" onclick="changeZoom(1)" title="Zoom in">🔍</div>
    <div class="tool-btn" id="tool-zoom-out" onclick="changeZoom(-1)" title="Zoom out">🔎</div>
  </div>

  <!-- Main canvas -->
  <div id="canvas-area">
    <canvas id="editor-canvas"></canvas>
    <div id="status-bar">x: 0, y: 0 | tile: (0, 0) | tool: pencil</div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <div class="panel-section">
      <div class="panel-title">Scene</div>
      <select id="scene-select" onchange="loadScene(this.value)">
        <option value="">— Select Scene —</option>
        <option value="nest">Roc's Nest</option>
        <option value="champion">Hall of Champions</option>
        <option value="eagle_crag">Eagle's Crag</option>
      </select>
      <button onclick="document.getElementById('img-upload').click()">Load Image…</button>
      <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="loadImageFile(event)">
    </div>

    <div class="panel-section">
      <div class="panel-title">Legend</div>
      <div style="font-size:10px; line-height:1.6;">
        <span style="display:inline-block;width:12px;height:12px;background:rgba(0,200,0,0.5);border:1px solid #0a0;"></span> Walkable<br>
        <span style="display:inline-block;width:12px;height:12px;background:rgba(200,0,0,0.5);border:1px solid #a00;"></span> Blocked<br>
        <span style="display:inline-block;width:12px;height:12px;background:rgba(255,200,0,0.5);border:1px solid #a80;"></span> Foreground<br>
        <span style="display:inline-block;width:12px;height:12px;background:rgba(0,100,255,0.5);border:1px solid #00a;"></span> NPC Start<br>
        <span style="display:inline-block;width:12px;height:12px;background:rgba(180,0,255,0.5);border:1px solid #808;"></span> Patrol Path
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">NPCs</div>
      <select id="npc-type-select">
        <option value="eagle">Eagle (🦅)</option>
        <option value="clerk">Clerk of Champions (🧑‍⚖️)</option>
        <option value="fighting_master">Fighting Master (🤺)</option>
        <option value="custom">Custom…</option>
      </select>
      <div id="npc-list" style="max-height:80px; overflow-y:auto; border:1px solid #888; margin-top:2px;"></div>
      <button onclick="clearSelectedNPC()">Remove Selected</button>
    </div>

    <div class="panel-section">
      <div class="panel-title">Grid</div>
      <div style="display:flex; gap:4px; align-items:center;">
        <label style="font-size:10px;">Tile size:</label>
        <input type="number" id="tile-size-input" value="32" min="8" max="64" style="width:50px;" onchange="updateTileSize()">
      </div>
      <div style="display:flex; gap:4px; align-items:center; margin-top:2px;">
        <label style="font-size:10px; white-space:nowrap;">Show grid:</label>
        <input type="checkbox" id="show-grid" checked onchange="redraw()">
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">Export</div>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="copyJSON()">Copy to Clipboard</button>
      <button onclick="importJSON()">Import JSON…</button>
      <div style="font-size:10px; margin-top:4px; color:#444;" id="export-stats"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let currentTool = 'pencil';
let currentScene = '';
let tileSize = 32;
let zoom = 1;
let bgImage = null;
let gridW = 0, gridH = 0;
let boundaryMap = [];   // 0=unset, 1=walkable, 2=blocked, 3=foreground
let npcPlacements = []; // {type, name, x, y, patrolPath:[]}
let selectedNPC = null;
let painting = false;
let lastTile = null;
let patrolTarget = null;

const SCENE_BG_KEYS = {
  'nest':       'bg_roc_nest',
  'champion':   'bg_hall_of_champions',
  'eagle_crag': 'bg_eagle_s_crag'
};
const SCENE_DEFAULT_NPCS = {
  'nest':       [{ type: 'eagle', name: 'Eagle', x: 0, y: 0, patrolPath: [] }],
  'champion':   [{ type: 'clerk', name: 'Clerk of Champions', x: 0, y: 0, patrolPath: [] }],
  'eagle_crag': [{ type: 'eagle', name: 'Eagle', x: 0, y: 0, patrolPath: [] }]
};

const canvas = document.getElementById('editor-canvas');
const ctx = canvas.getContext('2d');

// ── Tools ──
function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if(btn) btn.classList.add('active');
  canvas.style.cursor = t === 'pencil' ? 'crosshair' : t === 'eraser' ? 'cell' : 'pointer';
}

function changeZoom(dir) {
  zoom = Math.max(0.25, Math.min(4, zoom + dir * 0.25));
  redraw();
}

function updateTileSize() {
  tileSize = parseInt(document.getElementById('tile-size-input').value) || 32;
  if(bgImage) initGrid();
  redraw();
}

// ── Scene Loading ──
function loadScene(sceneName) {
  currentScene = sceneName;
  if(!sceneName) return;
  document.getElementById('current-scene-label').textContent = 'Scene: ' + sceneName;
  // Try to load background from game assets if loaded in parent window
  const bgKey = SCENE_BG_KEYS[sceneName];
  let loaded = false;
  if(window.opener && window.opener.assets && window.opener.assets.sprites && window.opener.assets.sprites[bgKey]) {
    const img = new Image();
    img.onload = () => { bgImage = img; initGrid(); redraw(); };
    img.src = window.opener.assets.sprites[bgKey].src || window.opener.assets.sprites[bgKey];
    loaded = true;
  }
  // Seed default NPCs in the middle if not set
  if(!npcPlacements.length && SCENE_DEFAULT_NPCS[sceneName]) {
    npcPlacements = SCENE_DEFAULT_NPCS[sceneName].map(n => ({ ...n, x: Math.floor(gridW/2), y: Math.floor(gridH/2) }));
  }
  renderNPCList();
  if(!loaded) document.getElementById('current-scene-label').textContent += ' (load image manually)';
}

function loadImageFile(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { bgImage = img; initGrid(); redraw(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initGrid() {
  if(!bgImage) return;
  gridW = Math.ceil(bgImage.width / tileSize);
  gridH = Math.ceil(bgImage.height / tileSize);
  // Initialize all tiles as walkable
  boundaryMap = Array.from({length: gridH}, () => Array(gridW).fill(1));
  // Place default NPC in center
  npcPlacements.forEach(n => { n.x = Math.floor(gridW/2); n.y = Math.floor(gridH/2); });
  canvas.width = bgImage.width;
  canvas.height = bgImage.height;
  updateExportStats();
}

// ── Drawing ──
function redraw() {
  if(!ctx) return;
  ctx.save();
  ctx.scale(zoom, zoom);
  ctx.clearRect(0, 0, canvas.width / zoom, canvas.height / zoom);

  // Background image
  if(bgImage) {
    ctx.drawImage(bgImage, 0, 0);
  } else {
    // MacPaint checkerboard
    for(let y = 0; y < 600; y += 8) for(let x = 0; x < 800; x += 8) {
      ctx.fillStyle = ((x+y) / 8 % 2 === 0) ? '#fff' : '#ddd';
      ctx.fillRect(x, y, 8, 8);
    }
  }

  // Boundary overlay
  const showGrid = document.getElementById('show-grid').checked;
  for(let y = 0; y < gridH; y++) {
    for(let x = 0; x < gridW; x++) {
      const val = boundaryMap[y][x];
      let fillColor = null;
      if(val === 1) fillColor = 'rgba(0,200,0,0.18)';
      else if(val === 2) fillColor = 'rgba(200,0,0,0.35)';
      else if(val === 3) fillColor = 'rgba(255,200,0,0.35)';
      if(fillColor) {
        ctx.fillStyle = fillColor;
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
      if(showGrid) {
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }
    }
  }

  // NPC placements
  npcPlacements.forEach((npc, i) => {
    // Patrol path
    if(npc.patrolPath.length > 1) {
      ctx.strokeStyle = 'rgba(180,0,255,0.7)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4,2]);
      ctx.beginPath();
      ctx.moveTo(npc.patrolPath[0].x * tileSize + tileSize/2, npc.patrolPath[0].y * tileSize + tileSize/2);
      for(let p of npc.patrolPath.slice(1)) ctx.lineTo(p.x * tileSize + tileSize/2, p.y * tileSize + tileSize/2);
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // NPC dot
    ctx.fillStyle = selectedNPC === i ? '#00f' : 'rgba(0,100,255,0.8)';
    ctx.beginPath();
    ctx.arc(npc.x * tileSize + tileSize/2, npc.y * tileSize + tileSize/2, tileSize/2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${tileSize * 0.55}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(npc.type === 'eagle' ? '🦅' : npc.type === 'clerk' ? '🧑‍⚖️' : '👤',
      npc.x * tileSize + tileSize/2, npc.y * tileSize + tileSize/2);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(npc.name || npc.type, npc.x * tileSize + tileSize/2, npc.y * tileSize + tileSize + 1);
  });

  ctx.restore();

  // Canvas size must match zoom
  canvas.style.width = (bgImage ? bgImage.width : 800) * zoom + 'px';
  canvas.style.height = (bgImage ? bgImage.height : 600) * zoom + 'px';
  updateExportStats();
}

// ── Input ──
function getTileFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / zoom;
  const my = (e.clientY - rect.top) / zoom;
  return { tx: Math.floor(mx / tileSize), ty: Math.floor(my / tileSize), px: mx, py: my };
}

canvas.addEventListener('mousedown', e => {
  painting = true;
  handlePaint(e);
});
canvas.addEventListener('mousemove', e => {
  const { tx, ty } = getTileFromEvent(e);
  document.getElementById('status-bar').textContent =
    `x: ${Math.floor((e.clientX - canvas.getBoundingClientRect().left)/zoom)}, y: ${Math.floor((e.clientY - canvas.getBoundingClientRect().top)/zoom)} | tile: (${tx}, ${ty}) | tool: ${currentTool}`;
  if(painting) handlePaint(e);
});
canvas.addEventListener('mouseup', () => { painting = false; lastTile = null; });
canvas.addEventListener('mouseleave', () => { painting = false; lastTile = null; });

function handlePaint(e) {
  const { tx, ty } = getTileFromEvent(e);
  if(tx < 0 || ty < 0 || tx >= gridW || ty >= gridH) return;
  const key = `${tx},${ty}`;
  if(key === lastTile) return;
  lastTile = key;

  if(currentTool === 'pencil') {
    boundaryMap[ty][tx] = 1;
  } else if(currentTool === 'eraser') {
    boundaryMap[ty][tx] = 2;
  } else if(currentTool === 'foreground') {
    boundaryMap[ty][tx] = 3;
  } else if(currentTool === 'fill') {
    const target = boundaryMap[ty][tx];
    const fill = (e.buttons === 1) ? 1 : 2;
    if(target !== fill) floodFill(tx, ty, target, fill);
  } else if(currentTool === 'npc') {
    const npcType = document.getElementById('npc-type-select').value;
    const npcName = npcType === 'custom' ? (prompt('NPC name?') || 'NPC') : npcType;
    npcPlacements.push({ type: npcType, name: npcName, x: tx, y: ty, patrolPath: [{x: tx, y: ty}] });
    selectedNPC = npcPlacements.length - 1;
    renderNPCList();
  } else if(currentTool === 'patrol') {
    if(selectedNPC !== null && npcPlacements[selectedNPC]) {
      npcPlacements[selectedNPC].patrolPath.push({ x: tx, y: ty });
    }
  }
  redraw();
}

function floodFill(x, y, target, fill) {
  if(x < 0 || y < 0 || x >= gridW || y >= gridH) return;
  if(boundaryMap[y][x] !== target) return;
  const stack = [{x, y}];
  while(stack.length) {
    const {x: cx, y: cy} = stack.pop();
    if(cx < 0 || cy < 0 || cx >= gridW || cy >= gridH) continue;
    if(boundaryMap[cy][cx] !== target) continue;
    boundaryMap[cy][cx] = fill;
    stack.push({x:cx+1,y:cy},{x:cx-1,y:cy},{x:cx,y:cy+1},{x:cx,y:cy-1});
  }
}

// ── NPC UI ──
function renderNPCList() {
  const list = document.getElementById('npc-list');
  list.innerHTML = npcPlacements.map((n, i) =>
    `<div class="npc-item ${selectedNPC===i?'selected':''}" onclick="selectNPC(${i})">
       <span>${n.type === 'eagle' ? '🦅' : n.type === 'clerk' ? '🧑‍⚖️' : '👤'} ${n.name}</span>
       <span style="color:#888">(${n.x},${n.y})</span>
     </div>`
  ).join('');
}

function selectNPC(i) {
  selectedNPC = i;
  renderNPCList();
  redraw();
}

function clearSelectedNPC() {
  if(selectedNPC !== null) {
    npcPlacements.splice(selectedNPC, 1);
    selectedNPC = null;
    renderNPCList();
    redraw();
  }
}

// ── Export ──
function buildExportData() {
  const walkable = [], blocked = [], foreground = [];
  for(let y = 0; y < gridH; y++) for(let x = 0; x < gridW; x++) {
    if(boundaryMap[y][x] === 1) walkable.push({x, y});
    else if(boundaryMap[y][x] === 2) blocked.push({x, y});
    else if(boundaryMap[y][x] === 3) foreground.push({x, y});
  }
  return {
    scene: currentScene,
    tileSize,
    gridW, gridH,
    walkable,
    blocked,
    foreground,
    npcs: npcPlacements.map(n => ({ ...n }))
  };
}

function exportJSON() {
  const data = buildExportData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `boundary_${currentScene || 'scene'}.json`;
  a.click();
}

function copyJSON() {
  const json = JSON.stringify(buildExportData(), null, 2);
  navigator.clipboard.writeText(json).then(() => alert('Copied to clipboard!'));
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      const data = JSON.parse(ev.target.result);
      currentScene = data.scene || '';
      tileSize = data.tileSize || 32;
      gridW = data.gridW; gridH = data.gridH;
      boundaryMap = Array.from({length: gridH}, () => Array(gridW).fill(0));
      data.walkable?.forEach(({x,y}) => { boundaryMap[y][x] = 1; });
      data.blocked?.forEach(({x,y}) => { boundaryMap[y][x] = 2; });
      data.foreground?.forEach(({x,y}) => { boundaryMap[y][x] = 3; });
      npcPlacements = data.npcs || [];
      renderNPCList(); redraw();
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function updateExportStats() {
  if(!gridW || !gridH) return;
  let w = 0, b = 0, f = 0;
  for(let y = 0; y < gridH; y++) for(let x = 0; x < gridW; x++) {
    if(boundaryMap[y][x] === 1) w++;
    else if(boundaryMap[y][x] === 2) b++;
    else if(boundaryMap[y][x] === 3) f++;
  }
  document.getElementById('export-stats').textContent =
    `${gridW}×${gridH} grid | ${w} walk | ${b} blocked | ${f} fg | ${npcPlacements.length} NPCs`;
}

function newFile() {
  if(confirm('Clear current work?')) {
    bgImage = null; gridW = 0; gridH = 0; boundaryMap = []; npcPlacements = []; selectedNPC = null;
    canvas.width = 800; canvas.height = 600;
    redraw(); renderNPCList();
  }
}

function showHelp() {
  alert('Boundary Editor\n\n✏️ Pencil — mark tiles as walkable (green)\n🧹 Eraser — mark tiles as blocked (red)\n🌿 Foreground — avatar walks behind (yellow)\n👤 NPC — place NPC, select type in panel first\n🔄 Patrol — add waypoints to selected NPC patrol path\n🪣 Fill — flood fill (left=walkable, right=blocked)\n\nExport JSON → paste into boundary_data.js');
}

// Init
canvas.width = 800; canvas.height = 600;
redraw();
</script>
</body>
</html>
