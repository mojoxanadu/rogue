<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Rogue-Lite v5.2</title>
<style>
  :root {
    --bg: #141218; --surface: #1D1B20; --surface-container: #4A4458;
    --primary: #D0BCFF; --on-primary: #381E72; --secondary: #CCC2DC; 
    --error: #F2B8B5; --warning: #ffb74d; --success: #81c784;
    --radius-lg: 16px;
  }
  body { 
    background: var(--bg); color: var(--secondary); 
    font-family: 'Segoe UI', sans-serif; display: flex; 
    flex-direction: row; justify-content: center; align-items: flex-start; 
    margin: 0; padding: 24px; gap: 24px; user-select: none;
  }
  
  #game-container { display: flex; flex-direction: column; }
  #ui-container { display: flex; flex-direction: column; width: 440px; gap: 16px; }

  h1 { font-size: 1.5rem; margin: 0 0 12px 0; color: var(--primary); }
  
  canvas { 
    background: #000; border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6); 
    border: 4px solid var(--surface-container);
  }

  .stats-row { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;}
  .chip {
    background: var(--surface); padding: 8px 12px;
    border-radius: 999px; font-size: 13px; font-weight: 600;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }
  .chip.primary { background: var(--primary); color: var(--on-primary); }
  .chip.danger { background: var(--error); color: #000; }

  .equip-row { display: flex; gap: 12px; margin-bottom: 4px; }
  .equip-slot {
    width: 48px; height: 48px; background: var(--surface-container);
    border: 2px solid var(--secondary); border-radius: 8px;
    display: flex; justify-content: center; align-items: center; font-size: 24px;
    position: relative;
  }
  .equip-label {
    position: absolute; top: -10px; left: 4px; font-size: 10px; 
    background: var(--bg); padding: 0 4px; color: var(--secondary);
  }

  .inv-row { 
    display: flex; justify-content: space-between; gap: 4px;
    background: var(--surface-container); padding: 8px; border-radius: 12px;
  }
  .inv-slot {
    width: 36px; height: 36px; background: var(--surface);
    border: 2px solid var(--surface-container); border-radius: 6px;
    display: flex; justify-content: center; align-items: center;
    font-size: 18px; position: relative; cursor: pointer; transition: border 0.2s;
  }
  .inv-slot:hover { border-color: var(--primary); }
  .inv-slot.selected { border-color: var(--success); }
  .inv-slot .qty {
    position: absolute; bottom: -4px; right: -4px; color: var(--primary); 
    font-size: 11px; font-weight: bold; background: var(--bg); border-radius: 50%; padding: 0 4px;
  }
  .inv-slot .hotkey { position: absolute; top: 0px; left: 2px; color: #888; font-size: 9px; }

  .controls { display: flex; gap: 8px; }
  button {
    background: var(--surface-container); color: var(--on-primary);
    border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer;
    font-weight: bold; flex: 1; font-size: 16px; background: var(--primary);
  }
  button:hover { filter: brightness(1.1); }

  #log { 
    height: 180px; background: var(--surface);
    border-radius: var(--radius-lg); padding: 12px; 
    overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.4;
  }
  .log-new { color: var(--primary); }

  #overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border: 4px solid var(--surface-container);
    border-radius: var(--radius-lg); padding: 24px; max-width: 400px; text-align: center;
  }
  .modal h2 { margin-top: 0; color: var(--primary); }
  .shop-item { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center;}
  .shop-item button { flex: 0 0 auto; margin-left: 12px; padding: 6px 12px; font-size: 12px;}
  .egg-btn { margin: 4px; padding: 8px 16px; font-size: 14px; }
  
  @keyframes rockViewport {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
    100% { transform: rotate(0deg); }
  }
</style>
</head>

  // SOURCE: src/audio.js
  // === Audio Synthesizer (FM / OPL style) ===
  const Sound = {
    ctx: null,
    tracks: {},
    currentTrack: null,
    musicTimer: null,

    init: () => {
      if(!Sound.ctx && (window.AudioContext || window.webkitAudioContext)) {
        try { Sound.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { Sound.ctx = 'failed'; }
      }
    },

    // FM Operator - The core of the OPL sound
    playFM: (freq, duration, vol=0.1, ratio=2, modulatorIndex=5) => {
      if(!Sound.ctx || Sound.ctx === 'failed') return;
      const t = Sound.ctx.currentTime;
      
      const carrier = Sound.ctx.createOscillator();
      const modulator = Sound.ctx.createOscillator();
      const modGain = Sound.ctx.createGain();
      const mainGain = Sound.ctx.createGain();

      carrier.frequency.value = freq;
      modulator.frequency.value = freq * ratio;
      modGain.gain.value = freq * modulatorIndex;

      modulator.connect(modGain);
      modGain.connect(carrier.frequency);
      carrier.connect(mainGain);
      mainGain.connect(Sound.ctx.destination);

      mainGain.gain.setValueAtTime(0, t);
      mainGain.gain.linearRampToValueAtTime(vol, t + 0.05);
      mainGain.gain.exponentialRampToValueAtTime(0.01, t + duration);

      carrier.start(t); modulator.start(t);
      carrier.stop(t + duration); modulator.stop(t + duration);
    },

    step: () => Sound.playTone(150, 'square', 0.05, 0.05, 50),
    grunt: () => Sound.playTone(200, 'triangle', 0.2, 0.2, 80),
    scream: () => Sound.playTone(400, 'sawtooth', 0.6, 0.3, 50),
    clink: () => Sound.playTone(1200, 'sine', 0.1, 0.1, 2000),
    sword: () => { Sound.playTone(400, 'square', 0.1, 0.2, 1200); setTimeout(() => Sound.playTone(800, 'triangle', 0.05, 0.1, 200), 50); },
    splash: () => Sound.playTone(100, 'triangle', 0.2, 0.2, 40),
    quack: () => { Sound.playTone(400, 'sawtooth', 0.1, 0.1, 600); setTimeout(() => Sound.playTone(400, 'sawtooth', 0.1, 0.1, 600), 120); },
    squeak: () => Sound.playTone(1800, 'sine', 0.05, 0.1, 2000),
    gurgle: () => { for(let i=0; i<4; i++) setTimeout(() => Sound.playTone(100 + Math.random()*100, 'sine', 0.2, 0.1, 50), i*150); },
    oof: () => Sound.playTone(120, 'sawtooth', 0.1, 0.2, 60),
    
    playTone: (freq, type, duration, vol=0.1, slideFreq=null) => {
      if(!Sound.ctx || Sound.ctx === 'failed') return;
      const osc = Sound.ctx.createOscillator();
      const gain = Sound.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, Sound.ctx.currentTime);
      if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, Sound.ctx.currentTime + duration);
      gain.gain.setValueAtTime(vol, Sound.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, Sound.ctx.currentTime + duration);
      osc.connect(gain); gain.connect(Sound.ctx.destination);
      osc.start(); osc.stop(Sound.ctx.currentTime + duration);
    },

    // Sequencer for JSON music tracks
    playMusic: (name) => {
      if(Sound.currentTrack === name) return;
      Sound.stopMusic();
      Sound.currentTrack = name;
      
      const track = Sound.tracks[name];
      if(!track) return;

      let step = 0;
      const nextNote = () => {
        if(Sound.currentTrack !== name) return;
        const note = track[step];
        if(note.f > 0) Sound.playFM(note.f, note.d, 0.02, note.r || 2, note.i || 5);
        step = (step + 1) % track.length;
        Sound.musicTimer = setTimeout(nextNote, note.d * 1000);
      };
      nextNote();
    },

    stopMusic: () => {
      Sound.currentTrack = null;
      if(Sound.musicTimer) clearTimeout(Sound.musicTimer);
    }
  };

  // SOURCE: src/map.js
  // === Map Generation ===
  function getDeadEndWall() {
    let candidates = [];
    for(let y=1; y<mapH-1; y++) {
      for(let x=1; x<mapW-1; x++) {
        if(theMap[y][x] === TILES.WALL) {
          let floors = 0;
          if(theMap[y-1][x] === TILES.FLOOR || theMap[y-1][x] === TILES.STORE || theMap[y-1][x] === TILES.BOOKSTORE || theMap[y-1][x] === TILES.LEFTYS) floors++;
          if(theMap[y+1][x] === TILES.FLOOR || theMap[y+1][x] === TILES.STORE || theMap[y+1][x] === TILES.BOOKSTORE || theMap[y+1][x] === TILES.LEFTYS) floors++;
          if(theMap[y][x-1] === TILES.FLOOR || theMap[y][x-1] === TILES.STORE || theMap[y][x-1] === TILES.BOOKSTORE || theMap[y][x-1] === TILES.LEFTYS) floors++;
          if(theMap[y][x+1] === TILES.FLOOR || theMap[y][x+1] === TILES.STORE || theMap[y][x+1] === TILES.BOOKSTORE || theMap[y][x+1] === TILES.LEFTYS) floors++;
          if(floors === 1) candidates.push({x,y});
        }
      }
    }
    if(candidates.length > 0) return candidates[Math.floor(Math.random()*candidates.length)];
    let backup;
    do { 
      backup = {x: 1+Math.floor(Math.random()*(mapW-2)), y: 1+Math.floor(Math.random()*(mapH-2))}; 
    } while(theMap[backup.y][backup.x] !== TILES.FLOOR);
    return backup;
  }

  function initMap(baseSize) {
    let scaledSize = Math.floor(baseSize * Math.pow(1.1, currentLevel - 1));
    if(scaledSize % 2 === 0) scaledSize++;
    mapW = scaledSize; mapH = scaledSize;
    
    theMap = Array(mapH).fill().map(()=>Array(mapW).fill(TILES.WALL));
    darkMap = Array(mapH).fill().map(()=>Array(mapW).fill(false));
    explored = Array(mapH).fill().map(()=>Array(mapW).fill(false));
    visible = Array(mapH).fill().map(()=>Array(mapW).fill(false));
    enemies = []; itemsOnGround = []; lightTurns = 0; player.darkSteps = 0;

    let rooms = [];
    function splitArea(x, y, w, h, iter) {
      if(iter === 0 || (w < 12 && h < 12)) {
        rooms.push({x, y, w, h, cx: Math.floor(x+w/2), cy: Math.floor(y+h/2)});
        return;
      }
      let splitHoriz = Math.random() > 0.5;
      if(w > h*1.5) splitHoriz = false; else if(h > w*1.5) splitHoriz = true;
      
      if(splitHoriz) {
        let split = Math.floor(h/2) + (Math.floor(Math.random()*3)-1);
        splitArea(x, y, w, split, iter-1);
        splitArea(x, y+split, w, h-split, iter-1);
      } else {
        let split = Math.floor(w/2) + (Math.floor(Math.random()*3)-1);
        splitArea(x, y, split, h, iter-1);
        splitArea(x+split, y, w-split, h, iter-1);
      }
    }
    splitArea(1, 1, mapW-2, mapH-2, 4);

    for(let r of rooms) {
      let type = Math.random();
      if(type < 0.25) {
        theMap[r.cy][r.cx] = TILES.FLOOR;
      } else if (type < 0.6) {
        let rw = Math.max(3, Math.floor(r.w * 0.7));
        let rh = Math.max(3, Math.floor(r.h * 0.7));
        let rx = r.x + Math.floor((r.w - rw)/2);
        let ry = r.y + Math.floor((r.h - rh)/2);
        for(let cy=ry; cy<ry+rh; cy++) for(let cx=rx; cx<rx+rw; cx++) theMap[cy][cx] = TILES.FLOOR;
      } else {
        let cx=r.cx, cy=r.cy, steps=r.w*r.h;
        for(let i=0; i<steps; i++) {
          theMap[cy][cx] = TILES.FLOOR;
          let dirs = [[0,-1],[1,0],[0,1],[-1,0]];
          let d = dirs[Math.floor(Math.random()*4)];
          if(cx+d[0]>r.x && cx+d[0]<r.x+r.w-1) cx+=d[0];
          if(cy+d[1]>r.y && cy+d[1]<r.y+r.h-1) cy+=d[1];
        }
      }
    }

    for(let i=0; i<rooms.length-1; i++) {
      let p1 = rooms[i], p2 = rooms[i+1];
      let cx = p1.cx, cy = p1.cy;
      while(cx !== p2.cx) { theMap[cy][cx] = TILES.FLOOR; cx += Math.sign(p2.cx - cx); }
      while(cy !== p2.cy) { theMap[cy][cx] = TILES.FLOOR; cy += Math.sign(p2.cy - cy); }
    }

    if(currentLevel % 2 === 0) theMap[getDeadEndWall().y][getDeadEndWall().x] = TILES.STORE;
    if(currentLevel === 3) theMap[getDeadEndWall().y][getDeadEndWall().x] = TILES.LEFTYS;
    if(currentLevel === 4) theMap[getDeadEndWall().y][getDeadEndWall().x] = TILES.BOOKSTORE;

    for(let i=0; i<2; i++) {
      let rm = rooms[Math.floor(Math.random()*rooms.length)];
      let cx = Math.floor(rm.x + rm.w/2);
      let cy = Math.floor(rm.y + rm.h/2);
      if(theMap[cy][cx] === TILES.FLOOR) theMap[cy][cx] = TILES.CHEST;
    }

    let upStairPos = getDeadEndWall();
    player.x = upStairPos.x; player.y = upStairPos.y;
    theMap[player.y][player.x] = currentLevel > 1 ? TILES.STAIR_UP : TILES.FLOOR;

    let downStairPos = getDeadEndWall();
    while(downStairPos.x === upStairPos.x && downStairPos.y === upStairPos.y) downStairPos = getDeadEndWall();
    theMap[downStairPos.y][downStairPos.x] = TILES.STAIR_DOWN;

    // Chambers before monsters (v5.3.6)
    let safeDist = (r) => Math.abs(r.cx - player.x) + Math.abs(r.cy - player.y) > 10 && 
                         Math.abs(r.cx - downStairPos.x) + Math.abs(r.cy - downStairPos.y) > 10;
    
    if(Math.random() < 0.50) {
      let candidates = rooms.filter(safeDist);
      if(candidates.length > 0) {
        let r = candidates[Math.floor(Math.random()*candidates.length)];
        for(let y=r.y; y<r.y+r.h; y++) for(let x=r.x; x<r.x+r.w; x++) {
          if(theMap[y][x] === TILES.FLOOR) darkMap[y][x] = true;
        }
      }
    }
    if(Math.random() < 0.10) {
      let candidates = rooms.filter(safeDist);
      if(candidates.length > 0) {
        let r = candidates[Math.floor(Math.random()*candidates.length)];
        for(let y=r.y; y<r.y+r.h; y++) for(let x=r.x; x<r.x+r.w; x++) {
          if(theMap[y][x] === TILES.FLOOR) theMap[y][x] = TILES.WATER;
        }
      }
    }

    if(currentLevel === 2) {
      itemsOnGround.push({ x: player.x + 1, y: player.y, icon: '🥾' });
      let eventRoom = rooms[rooms.length-1];
      enemies.push({ x: eventRoom.cx, y: eventRoom.cy, type: "cat", stats: {...MONSTER_DEF["cat"]}, actionTimer: 0 });
      enemies.push({ x: eventRoom.cx + 1, y: eventRoom.cy, type: "wet_rat", stats: {...MONSTER_DEF["wet_rat"]}, actionTimer: 0 });
    }
    
    if(currentLevel === 1 || currentLevel === 3) itemsOnGround.push({ x: getRandomFloor().x, y: getRandomFloor().y, icon: '🪵' });

    if(currentLevel >= 5 && currentLevel <= 6) Sound.playMusic('monkey');
    else if(currentLevel === 9) {
      Sound.playMusic('bandit');
      let camp = rooms[rooms.length-1];
      for(let y=camp.y; y<camp.y+camp.h; y++) for(let x=camp.x; x<camp.x+camp.w; x++) {
        if(theMap[y][x] === TILES.FLOOR) {
          if(x === camp.cx && y === camp.cy) itemsOnGround.push({ x, y, icon: '🏺' });
          else if(Math.random() < 0.3) enemies.push({ x, y, type: "pirate", stats: {...MONSTER_DEF["pirate"], icon: '💤'}, actionTimer: -100 });
        }
      }
    } else if(currentLevel === 10) {
      enemies.push({ x: downStairPos.x, y: downStairPos.y, type: "genie", stats: {...MONSTER_DEF["genie"]}, actionTimer: 0 });
    } else { Sound.stopMusic(); }

    if(currentLevel === 6) {
      let bossRoom = rooms[1];
      theMap[bossRoom.cy][bossRoom.cx] = TILES.CHEST;
      enemies.push({ x: bossRoom.cx + 1, y: bossRoom.cy, type: "master", stats: {...MONSTER_DEF["master"]}, actionTimer: 0 });
    }

    spawnMonsters(Math.floor(6 * Math.pow(1.2, currentLevel - 1)));
    
    for(let i=0; i<5; i++) {
      let pos = getRandomFloor();
      spawnLoot(pos.x, pos.y, false, false);
    }
  }

  function getRandomFloor() {
    let x,y, escapes = 0;
    do { 
      x = 1+Math.floor(Math.random()*(mapW-2)); 
      y = 1+Math.floor(Math.random()*(mapH-2)); 
      escapes++;
    } while(theMap[y][x] !== TILES.FLOOR && theMap[y][x] !== TILES.WATER && escapes < 1000);
    return {x,y};
  }

  function spawnMonsters(count) {
    for(let i=0; i<count; i++) {
      let pos = {x: 1+Math.floor(Math.random()*(mapW-2)), y: 1+Math.floor(Math.random()*(mapH-2))};
      let tile = theMap[pos.y][pos.x];
      if(tile !== TILES.FLOOR && tile !== TILES.WATER) { i--; continue; }
      
      let typeStr = "chipmunk";
      if(tile === TILES.WATER) {
        let roll = Math.random();
        if(roll < 0.6) { typeStr = "duck"; }
        else if(roll < 0.9) { typeStr = "wet_rat"; }
        else typeStr = "shark";
      } else {
        let types = ["chipmunk"];
        if(currentLevel >= 2) types.push("goat");
        if(currentLevel >= 3) types.push("snake");
        if(currentLevel >= 4) types.push("ghost", "troll");
        if(currentLevel >= 5) types.push("medusa", "pirate");
        if(currentLevel >= 6) types.push("robot");
        typeStr = types[Math.floor(Math.random() * types.length)];
      }
      enemies.push({ x: pos.x, y: pos.y, type: typeStr, stats: {...MONSTER_DEF[typeStr]}, actionTimer: 0 });
    }
  }

  function spawnLoot(x, y, isChest, forceStandard) {
    if(!forceStandard && Math.random() < 0.01) {
      let rares = ['👗','🦠','🐓','🧦','💎'];
      itemsOnGround.push({x, y, icon: rares[Math.floor(Math.random()*rares.length)]});
      return;
    }
    
    let roll = Math.random();
    let keys = Object.keys(ITEM_DEF);
    if(isChest) {
       if(roll < 0.15) { enemies.push({ x, y, type: "goat", stats: {...MONSTER_DEF["goat"]}, actionTimer: 0 }); return; }
       else if(roll < 0.50) itemsOnGround.push({x, y, icon: '🕯️'});
       else if(roll < 0.60) { player.gp+=100; Sound.clink(); return; }
       else if(roll < 0.70) itemsOnGround.push({x, y, icon: '🧪'});
       else if(roll < 0.80) itemsOnGround.push({x, y, icon: '🐡'});
       else if(roll < 0.90) itemsOnGround.push({x, y, icon: '🗡️'});
       else itemsOnGround.push({x, y, icon: '🛡️'});
    } else {
       if(!forceStandard && roll < 0.2) return;
       let icon = keys[Math.floor(Math.random() * keys.length)];
       const exclude = ['◾','🪫','🍛','🥤','🎩','🔦','🔮','👗','🦠','🐓','🧦','💎','🧴','🕴️','🦷','🏺','🥾','🔥📘','⚡📘','❄️📘','💪📘','🛡️📘','💖📘','👟📘'];
       if(!exclude.includes(icon)) {
           itemsOnGround.push({x, y, icon});
       }
    }
  }

  // SOURCE: src/mechanics.js
  // === Inventory & Shop Actions ===
  function toggleDropMode() { dropMode = !dropMode; updateUI(); }

  function handleItemClick(idx) {
    let itemObj = inventory[idx];
    if(!itemObj) return;

    if(isIdentifying) {
      let def = ITEM_DEF[itemObj.icon];
      logMsg(`[ID] ${def.name}: Dmg:${def.maxDamage} Heal:${def.maxHeal} Evade:${def.evadePercent}%`);
      isIdentifying = false; renderInventory(); return;
    }

    if(dropMode) {
      itemsOnGround.push({ x: player.x, y: player.y, icon: itemObj.icon });
      logMsg(`Dropped ${ITEM_DEF[itemObj.icon].name}`);
      decrementItem(idx); dropMode = false; updateUI(); return;
    }

    if(itemObj.icon === '🥾') {
      let nearestCat = enemies.findIndex(e => e.type === 'cat' && Math.abs(e.x - player.x) + Math.abs(e.y - player.y) <= 3);
      if(nearestCat !== -1) {
        logMsg("You throw the boot at the cat! It runs away in terror.");
        enemies.splice(nearestCat, 1);
        player.savedRat = true;
        decrementItem(idx);
      } else { logMsg("Nothing to throw the boot at."); }
      return;
    }

    if(itemObj.icon === '🏺') {
      let nearestGenie = enemies.findIndex(e => e.type === 'genie' && Math.abs(e.x - player.x) + Math.abs(e.y - player.y) <= 3);
      if(nearestGenie !== -1) {
        logMsg("<span style='color:var(--success)'>The Genie is sucked into the Brass Bottle! The path is clear!</span>");
        enemies.splice(nearestGenie, 1);
        decrementItem(idx);
        // Special case: make current tile stairs to win
        theMap[player.y][player.x] = TILES.STAIR_DOWN;
        drawMap();
      } else {
        logMsg("<span style='color:var(--error)'>You open the bottle too soon! An angry genie turns you to ASHES!</span>");
        document.getElementById('modal-content').innerHTML = `<h2>⚱️ ASHES TO ASHES</h2><p>You opened the bottle prematurely. The genie was not amused.</p><button onclick="location.reload()">Restart</button>`;
        document.getElementById('overlay').style.display = 'flex';
        isDead = true; Sound.scream();
      }
      return;
    }

    let def = ITEM_DEF[itemObj.icon];
    if(def.type === "bag") { openBag(idx); return; }
    if(def.type === "weapon") { swapEquip(idx, 'leftHand'); return; }
    if(def.type === "armor") { swapEquip(idx, def.slot || 'chest'); return; }
    
    if(def.type === "food" || def.type === "potion") {
      if(itemObj.icon === '🧴') {
         if(player.statusType === 'disease') {
            player.statusType = null;
            player.statusTurns = 0;
            logMsg("You used the 🧴. The disease was cured... somehow.");
            decrementItem(idx);
         } else {
            logMsg("You look at the 🧴. Best save it for when you need it.");
         }
         updateUI(); return;
      }
      
      if(def.maxHeal > 0) {
        if(def.type === "potion") player.hp = Math.min(player.maxHp, player.hp + def.maxHeal);
        else player.totalHealPending += def.maxHeal; // Food heals over time
      }
      if(def.foodValue > 0) player.hunger = Math.max(0, player.hunger - def.foodValue);
      if(def.maxPoison > 0) { player.hp -= def.maxPoison; logMsg("Ugh! It was poisoned!"); }
      if(itemObj.icon === '🥤') { player.statusType = 'sugar'; player.statusTurns = 10; logMsg("Sugar Rush! 100% Hit."); }
      if(itemObj.icon === '🦠') { player.statusType = 'disease'; player.statusTurns = 100; logMsg("You caught a disease."); }
      logMsg(`Consumed ${def.name}.`);
      decrementItem(idx);
    }
    else if(def.type === "scroll") {
      if(itemObj.icon === '📃') { isIdentifying = true; logMsg("Select an item to identify."); decrementItem(idx); renderInventory(); return;}
      if(itemObj.icon === '🔮') { 
        let lv = prompt("Teleport to which floor number?"); 
        if(lv && !isNaN(lv)) { 
          levelCache[currentLevel] = { theMap, explored, visible, enemies, itemsOnGround, mapW, mapH };
          currentLevel = parseInt(lv); initMap(50); decrementItem(idx); 
        }
      } else if (def.spell) {
        castSpell(def.spell, true);
        decrementItem(idx);
      }
    }
    else if(def.type === "tome") {
      if(!player.spells[def.spell]) {
        player.spells[def.spell] = { level: 1, uses: 0 };
        logMsg(`<span style='color:var(--primary)'>You learned ${def.spell.toUpperCase()}!</span>`);
        decrementItem(idx);
      } else {
        logMsg("You already know this spell.");
      }
    }
    else if(def.type === "light") {
      lightTurns = itemObj.icon === '🔦' ? 1000 : 100;
      logMsg(`${def.name} activated for ${lightTurns} turns.`);
      inventory[idx].icon = itemObj.icon === '🔦' ? '🪫' : '◾';
      renderInventory();
    }
    else if(itemObj.icon === '🐓') { logMsg("COCKADOODLEDOO!"); }
    else { logMsg(`You look at the ${def.name}. It does nothing.`); }
    
    updateUI();
  }

  window.castSpell = (spellKey, isScroll = false) => {
    let sp = player.spells[spellKey];
    let cost = 0;
    let powerMult = 1.0;
    
    if(!isScroll) {
      if(!sp) return;
      cost = Math.floor(10 * Math.pow(1.1, sp.level - 1));
      if(player.mp < cost) { logMsg("Not enough MP!"); return; }
      player.mp -= cost;
      powerMult = Math.pow(1.1, sp.level - 1);
      
      sp.uses++;
      if(sp.uses >= 100) {
        sp.uses = 0;
        sp.level++;
        logMsg(`<span style='color:var(--primary)'>${spellKey.toUpperCase()} reached Level ${sp.level}!</span>`);
      }
      document.getElementById('overlay').style.display = 'none'; // Close magic menu if open
    }
    
    if(spellKey === 'fireball' || spellKey === 'lightning') {
      let nearest = null, minDist = 999;
      enemies.forEach((e, idx) => {
        if(visible[e.y][e.x]) {
          let dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
          if(dist < minDist) { minDist = dist; nearest = idx; }
        }
      });
      if(nearest !== null) {
        let e = enemies[nearest];
        let baseDmg = spellKey === 'fireball' ? 15 : 25;
        let dmg = Math.floor(baseDmg * powerMult);
        e.stats.hp -= dmg;
        logMsg(`Cast ${spellKey} on ${e.stats.icon} for ${dmg} dmg!`);
        Sound.scream();
        if(e.stats.hp <= 0) doCombat(nearest); // triggers kill logic
      } else { logMsg("No visible targets."); if(!isScroll) player.mp+=cost; } // refund mp
    } else if (spellKey === 'shopping') {
      let storePos = {x: player.x, y: player.y};
      let found = false;
      let dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      for(let i=0; i<4; i++) {
         let nx = player.x + dirs[i][0], ny = player.y + dirs[i][1];
         if(theMap[ny][nx] === TILES.WALL) { storePos = {x:nx, y:ny}; found = true; break; }
      }
      if(found) {
        theMap[storePos.y][storePos.x] = TILES.STORE;
        logMsg("A magical store appears nearby.");
        calculateFOV(); drawMap();
      } else { logMsg("No wall nearby to open store."); if(!isScroll) player.mp+=cost; }
    } else if (spellKey === 'light') {
      lightTurns += Math.floor(20 * powerMult);
      logMsg(`Magical light for ${Math.floor(20 * powerMult)} turns.`);
      calculateFOV(); drawMap();
    }
    
    updateUI();
  };

  function swapEquip(idx, slot) {
    let item = inventory[idx];
    let currentEquip = player.equipped[slot];
    player.equipped[slot] = item.icon;
    inventory[idx] = currentEquip ? { icon: currentEquip, qty: 1 } : null;
    logMsg(`Equipped ${ITEM_DEF[item.icon].name}.`);
    
    // Update stats based on equipment
    let totalDmg = 2;
    let totalEvade = 15;
    
    Object.values(player.equipped).forEach(icon => {
      if(icon) {
        let d = ITEM_DEF[icon];
        if(d.maxDamage) totalDmg += d.maxDamage;
        if(d.evadePercent) totalEvade += d.evadePercent;
      }
    });

    player.baseDmg = totalDmg;
    player.dodgeRate = totalEvade / 100;
    renderInventory(); updateUI();
  }

  function openBag(bagIdx) {
    let bag = inventory[bagIdx];
    let def = ITEM_DEF[bag.icon];
    if(!bag.contents) bag.contents = new Array(def.slots).fill(null);

    let html = `<h2>${def.name}</h2><div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin-bottom:16px; justify-items: center;">`;
    bag.contents.forEach((item, i) => {
      html += `<div class="inv-slot" style="width:48px; height:48px; background:var(--surface-container); border:2px solid var(--secondary); border-radius:8px; display:flex; justify-content:center; align-items:center; font-size:24px;" onclick="handleBagItem(${bagIdx}, ${i})">${item ? item.icon : ''}</div>`;
    });
    html += `</div><button onclick="document.getElementById('overlay').style.display='none'">Close</button>`;
    
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('overlay').style.display = 'flex';
  }

  window.handleBagItem = (bagIdx, itemIdx) => {
    let bag = inventory[bagIdx];
    let item = bag.contents[itemIdx];
    
    if(item) {
      let empty = inventory.findIndex(s => s === null);
      if(empty !== -1) {
        inventory[empty] = item;
        bag.contents[itemIdx] = null;
        openBag(bagIdx); renderInventory();
      } else alert("Main inventory full!");
    } else {
      logMsg("Bag stashing is not yet automated. Drop and pick up while bag is open?");
    }
  };

  function decrementItem(idx) {
    inventory[idx].qty--;
    if(inventory[idx].qty <= 0) inventory[idx] = null;
    renderInventory();
  }

  function pickupItems() {
    let toRemove = [];
    itemsOnGround.forEach((item, index) => {
      if(item.x === player.x && item.y === player.y) {
        let def = ITEM_DEF[item.icon];
        if(def.type === "wealth") {
          let amount = def.maxGP === 50 ? Math.floor(Math.random()*50)+1 : def.maxGP;
          player.gp += amount;
          Sound.clink(); logMsg(`Found ${amount} GP!`);
          toRemove.push(index); return;
        }

        if(item.icon === '🏺') {
          if(!player.savedRat) {
            logMsg("<span style='color:var(--error)'>The bandits wake up and capture you! You are tied up and executed.</span>");
            document.getElementById('modal-content').innerHTML = `<h2>🪢 CAPTURED</h2><p>You tried to sneak into the camp, but you had no friends to help you. The bandits showed no mercy.</p><button onclick="location.reload()">Restart</button>`;
            document.getElementById('overlay').style.display = 'flex';
            isDead = true; Sound.scream(); return;
          } else {
            document.getElementById('modal-content').innerHTML = `<h2>🐀 THE RAT'S REPAYMENT</h2><p>As you grab the bottle, the bandits surround and tie you up! <br><br>Suddenly, the rat you saved from the cat appears! It quickly chews through your ropes, allowing you to slip away into the shadows.</p><button onclick="document.getElementById('overlay').style.display='none'">Phew!</button>`;
            document.getElementById('overlay').style.display = 'flex';
            logMsg("The rat saved you! You secured the Brass Bottle.");
          }
        }

        let stacked = false;
        if(def.stackable) {
          let slot = inventory.find(i => i && i.icon === item.icon);
          if(slot) { slot.qty++; stacked = true; }
        }
        if(!stacked) {
          let emptyIdx = inventory.findIndex(i => i === null);
          if(emptyIdx !== -1) { inventory[emptyIdx] = { icon: item.icon, qty: 1 }; stacked = true; }
        }
        if(stacked) { toRemove.push(index); logMsg(`Picked up ${item.icon}`); }
      }
    });
    for (let i = toRemove.length - 1; i >= 0; i--) itemsOnGround.splice(toRemove[i], 1);
    renderInventory(); updateUI();
  }

  // SOURCE: src/engine.js

  function advanceTurn(steps = 1) {
    if(isDead) return;
    
    player.hunger = Math.min(100, player.hunger + (CONSTANTS.HUNGER_RATE * steps));
    if(lightTurns > 0) lightTurns = Math.max(0, lightTurns - steps);
    if(damageTint > 0) damageTint = Math.max(0, damageTint - 1);
    
    if(player.totalHealPending > 0) {
      let tick = Math.min(player.totalHealPending, 1 * steps);
      player.hp = Math.min(player.maxHp, player.hp + tick);
      player.totalHealPending -= tick;
    }

    if(darkMap[player.y][player.x] && lightTurns <= 0) {
      player.darkSteps += steps;
      if(player.darkSteps === 1) {
        document.getElementById('modal-content').innerHTML = `<h2>🌑 Pitch Black</h2><p>The room is dark. You should light a candle.</p><button onclick="document.getElementById('overlay').style.display='none'">OK</button>`;
        document.getElementById('overlay').style.display = 'flex';
      }
      if(player.darkSteps === 3) logMsg("<span style='color:var(--warning)'>You may be eaten by a grue.</span>");
      if(player.darkSteps >= 5) {
        Sound.gurgle();
        if(Math.random() < 0.50) {
          logMsg("<span style='color:var(--error)'>YOU WERE EATEN BY A GRUE!</span>");
          die(); return;
        }
      }
    } else {
      player.darkSteps = 0;
    }

    if(player.statusTurns > 0) {
      player.statusTurns -= steps;
      if(player.statusType === 'disease') player.hp -= (CONSTANTS.DISEASE_DAMAGE * steps);
      if(player.statusTurns <= 0) { 
        logMsg("Status effect ended."); 
        player.statusType = null; 
        document.getElementById('game').style.animation = 'none';
      }
    }

    if(player.hunger >= 100) {
      player.hp -= (CONSTANTS.HUNGER_DAMAGE * steps);
      logMsg("<span class='log-new'>You are starving!</span>");
    } else if (player.hunger < 50 && player.hp < player.maxHp) {
      player.hp = Math.min(player.maxHp, player.hp + (CONSTANTS.HUNGER_HEAL * steps));
    }

    if(player.hp <= 0) { die(); return; }

    if(Math.random() < CONSTANTS.SPAWN_RATE * steps) {
      let pos = getRandomFloor();
      if(Math.abs(pos.x - player.x) + Math.abs(pos.y - player.y) > 15) {
        enemies.push({ x: pos.x, y: pos.y, type: "chipmunk", stats: {...MONSTER_DEF["chipmunk"]}, actionTimer: 0 });
      }
    }

    let flowMap = Array(mapH).fill().map(()=>Array(mapW).fill(9999));
    let q = [{x: player.x, y: player.y, d: 0}];
    flowMap[player.y][player.x] = 0;
    let head = 0;
    while(head < q.length) {
      let curr = q[head++];
      if (curr.d > 20) continue; 
      let dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      for(let i=0; i<4; i++) {
        let nx=curr.x+dirs[i][0], ny=curr.y+dirs[i][1];
        if(nx>0 && nx<mapW && ny>0 && ny<mapH) {
          if(theMap[ny][nx] !== TILES.WALL || enemies.some(e => e.stats.throughWalls)) {
            if(flowMap[ny][nx] > curr.d + 1) {
              flowMap[ny][nx] = curr.d + 1;
              q.push({x:nx, y:ny, d:curr.d+1});
            }
          }
        }
      }
    }

    enemies.forEach((e, eIdx) => {
      e.actionTimer += (e.stats.speed * steps);
      while(e.actionTimer >= 1) {
        e.actionTimer -= 1;
        
        let nx = e.x, ny = e.y;
        let isAdj = Math.abs(e.x - player.x) <= 1 && Math.abs(e.y - player.y) <= 1;
        
        if(isAdj) {
           monsterAttack(eIdx);
        } else if(e.stats.throughWalls) {
          let dx = Math.sign(player.x - e.x); let dy = Math.sign(player.y - e.y);
          let moveX = Math.random() > 0.5;
          nx = e.x + (moveX ? dx : 0); ny = e.y + (moveX ? 0 : dy);
          if(!moveX && dy === 0) nx = e.x + dx; 
          if(moveX && dx === 0) ny = e.y + dy;
        } else {
          let best = 9999;
          let dirs = [[0,-1],[1,0],[0,1],[-1,0]];
          dirs.sort(() => Math.random() - 0.5);
          for(let i=0; i<4; i++) {
            let cx = e.x + dirs[i][0], cy = e.y + dirs[i][1];
            if(theMap[cy][cx] !== TILES.WALL && flowMap[cy][cx] < best) {
              let blocked = enemies.some(other => other !== e && other.x === cx && other.y === cy);
              if(!blocked) { best = flowMap[cy][cx]; nx = cx; ny = cy; }
            }
          }
        }
        
        if(nx === player.x && ny === player.y) {
           monsterAttack(eIdx);
        } else {
           if(theMap[ny][nx] !== TILES.WALL || e.stats.throughWalls) { e.x = nx; e.y = ny; }
        }
      }
    });

    calculateFOV(); drawMap(); updateUI();
  }

  function restPlayer() {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('modal-content').innerHTML = `<h2>💤 Sleeping...</h2>`;
    Sound.snore();
    
    setTimeout(() => {
      document.getElementById('overlay').style.display = 'none';
      let nearby = enemies.filter(e => Math.abs(e.x - player.x) + Math.abs(e.y - player.y) <= 5);
      
      if(nearby.length > 0 && Math.random() < 0.6) {
         logMsg("<span style='color:red'>AMBUSHED in your sleep!</span>");
         let e = nearby[0]; 
         e.x = player.x-1; e.y = player.y; 
         if(theMap[e.y][e.x] === TILES.WALL) { e.x = player.x+1; }
         player.hp -= (e.stats.dmg * 2);
         logMsg(`${e.stats.icon} crits you for ${e.stats.dmg*2}!`);
         damageTint = 15;
      } else {
         advanceTurn(10);
         player.hp = Math.min(player.maxHp, player.hp + 30);
         logMsg("You rested well and recovered HP.");
      }
      if(player.hp <= 0) die();
      updateUI(); drawMap();
    }, 1500);

        <h2 style="color:var(--error)">YOU DIED</h2>

  function checkLevelUp() {
    let requiredXp = CONSTANTS.XP_BASE * Math.pow(CONSTANTS.XP_MULT, player.level - 1);
    if (player.xp >= requiredXp) {
      player.xp -= requiredXp;
      player.level++;
      player.statPoints += 3;
      player.hp = player.maxHp;
      player.mp = player.maxMp;
      logMsg(`<span style='color:var(--success)'>LEVEL UP! You are now level ${player.level}.</span>`);
      triggerLevelUpVisuals();
      checkLevelUp(); 
    }
  }

  function triggerLevelUpVisuals() {
    let fw = document.createElement('div');
    fw.innerHTML = "🎆🎇✨ LEVEL UP ✨🎇🎆";
    fw.style.position = 'fixed';
    fw.style.top = '40%';

  function doCombat(enemyIndex) {
    let enemy = enemies[enemyIndex];
    let p = player, e = enemy.stats;

    if(e.isBoss && enemy.type === 'master') {
      insultBattle(enemyIndex);
      return;
    }

    Sound.step();

    let hitMod = p.statusType === 'sugar' ? 1.0 : p.hitRate;
    if(Math.random() > e.dodge && Math.random() <= hitMod) {
      let isCrit = Math.random() <= p.critRate;
      let dmg = p.baseDmg * (isCrit ? 2 : 1);
      e.hp -= dmg;
      Sound.grunt();
      logMsg(`Hit ${e.icon} for ${dmg}${isCrit ? ' (CRIT)' : ''}.`);
    } else { logMsg(`Missed the ${e.icon}.`); }

    if (e.hp <= 0) {
      logMsg(`Defeated ${e.icon}!`);
      let grantedXp = Math.floor((enemy.stats.hp + enemy.stats.dmg) * 2);
      if(enemy.stats.isBoss) grantedXp = 1000;
      player.xp += grantedXp;
      logMsg(`Gained ${grantedXp} XP.`);
      checkLevelUp();
      
      let dropRoll = Math.random();
      if(enemy.type === 'chipmunk' && dropRoll < 0.70) {
        itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '🍖'});
      } else if(enemy.type === 'wet_rat' && dropRoll < 0.80) {
        itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '🧀'});
      } else if(enemy.type === 'shark') {
        if(dropRoll < 0.30) itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '🕴️'});
        else itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '🦷'});
      } else if (enemy.stats.isBoss) {
        logMsg("<span style='color:var(--success)'>You claimed the Pirate Treasure!</span>");
        for(let i=0; i<10; i++) itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '💎'});
        player.gp += 10000;
      } else if (dropRoll < 0.05) {
        let bags = ['🎒', '💼', '📦'];
        itemsOnGround.push({x: enemy.x, y: enemy.y, icon: bags[Math.floor(Math.random()*bags.length)]});
      } else if (dropRoll < 0.065) { 
        let scrolls = ['🔥', '⚡', '🏪', '💡'];
        itemsOnGround.push({x: enemy.x, y: enemy.y, icon: scrolls[Math.floor(Math.random()*scrolls.length)]});
      } else if (dropRoll < 0.40) {
        spawnLoot(enemy.x, enemy.y, false, true); 
      }
      if(Math.random() < 0.1) itemsOnGround.push({x: enemy.x, y: enemy.y, icon: '🗝️'});
      
      enemies.splice(enemyIndex, 1);
    }
    advanceTurn(1);
  }

  function monsterAttack(enemyIndex) {
    let enemy = enemies[enemyIndex];
    let p = player, e = enemy.stats;
    if(Math.random() > p.dodgeRate && Math.random() <= e.hit) {
      let isCrit = Math.random() <= e.crit;
      let dmg = e.dmg * (isCrit ? 2 : 1);
      p.hp -= dmg; Sound.grunt(); damageTint = 15;
      logMsg(`${e.icon} hits you for ${dmg}.`);
      
      if(e.effect && Math.random() < e.effectChance) {
        player.statusType = e.effect;
        player.statusTurns = e.effect === 'freeze' ? CONSTANTS.FREEZE_TURNS : CONSTANTS.DIZZY_TURNS;
        logMsg(`<span style='color:var(--error)'>You are afflicted with ${e.effect}!</span>`);
        
        if(e.effect === 'dizzy') {
           document.getElementById('game').style.animation = 'rockViewport 2s infinite ease-in-out';
        }
      }
    } else { logMsg(`${e.icon} missed.`); }
  }

  function placePlayerOn(tileType) {
    for(let y=0; y<mapH; y++) {
      for(let x=0; x<mapW; x++) {
        if(theMap[y][x] === tileType) { player.x = x; player.y = y; return; }
      }
    }
  }

  function movePlayer(dx, dy) {
    if(isDead) return;
    let nx = player.x + dx, ny = player.y + dy;
    let tile = theMap[ny][nx];
    
    let enemyIdx = enemies.findIndex(e => e.x === nx && e.y === ny);
    if (enemyIdx !== -1) { doCombat(enemyIdx); return; }

    if (tile === TILES.WALL) { Sound.oof(); advanceTurn(1); return; }

    if (tile === TILES.CHEST) {
      let keyIdx = inventory.findIndex(i => i && i.icon === '🗝️');
      if(keyIdx !== -1) {
        decrementItem(keyIdx);
        theMap[ny][nx] = TILES.FLOOR; logMsg("Unlocked chest!"); 
        let beforeCount = enemies.length;
        spawnLoot(nx, ny, true);
        if(enemies.length > beforeCount) {
           logMsg("<span style='color:var(--error)'>IT'S AN AMBUSH!</span>");
           let e = enemies[enemies.length-1];
           player.hp -= (e.stats.dmg * 2);
           damageTint = 20;
           logMsg(`${e.stats.icon} crits you for ${e.stats.dmg * 2}!`);
        }
      } else { logMsg("Chest is locked. Needs a 🗝️."); }
      advanceTurn(1); return;
    }

    if (tile === TILES.STORE) { openStore('apu'); return; }
    if (tile === TILES.LEFTYS) { openStore('leftys'); return; }
    if (tile === TILES.BOOKSTORE) { openStore('bookstore'); return; }

    player.x = nx; player.y = ny; 
    if(tile === TILES.WATER) Sound.splash(); else Sound.step();
    pickupItems();
    
    if(tile === TILES.STAIR_DOWN) {
      levelCache[currentLevel] = { theMap, explored, visible, enemies, itemsOnGround, mapW, mapH };
      currentLevel++; logMsg(`Descended to Floor ${currentLevel}.`); 
      
      if(levelCache[currentLevel]) {
        let c = levelCache[currentLevel];
        theMap=c.theMap; explored=c.explored; visible=c.visible; enemies=c.enemies; itemsOnGround=c.itemsOnGround; mapW=c.mapW; mapH=c.mapH;
        placePlayerOn(TILES.STAIR_UP);
      } else { initMap(50); }
      
    } else if(tile === TILES.STAIR_UP && currentLevel > 1) {
      levelCache[currentLevel] = { theMap, explored, visible, enemies, itemsOnGround, mapW, mapH };
      currentLevel--; logMsg(`Ascended to Floor ${currentLevel}.`); 
      
      let c = levelCache[currentLevel];
      theMap=c.theMap; explored=c.explored; visible=c.visible; enemies=c.enemies; itemsOnGround=c.itemsOnGround; mapW=c.mapW; mapH=c.mapH;
      placePlayerOn(TILES.STAIR_DOWN);
    }
    
    advanceTurn(1);
  }

      m.innerHTML = `<h2>🏪 Apu's Mart</h2>
        <p>🙋 "Another one? Is this Sanji again?"</p>
        <p>🧔🏿‍♂️ "No, no! This is my other brother, Manjula! We are a very large family. All in the convenience business!"</p>
        <button style="margin-top:16px; background:var(--surface-container)" onclick="openStore('apu')">Sure...</button>`;
    } else {
      m.innerHTML = `<h2>🏪 Apu's Mart</h2>
        <p>🙋 "Wait, how many of you ARE there??"</p>
        <p>🧔🏿‍♂️ "I have eight brothers, three sisters, and a cousin named Dave. We have a very efficient franchise model for deep-dungeon logistics."</p>
        <p>🧔🏿‍♂️ "Also, stop asking questions and buy more Slurpees."</p>
        <button style="margin-top:16px; background:var(--surface-container)" onclick="openStore('apu')">Buy Slurpees</button>`;
    }
  }

  function larryEncounter() {
    let m = document.getElementById('modal-content');
    let hasProp = inventory.some(i => i && i.icon === '🧴');
    
    let html = `<h2>🫦 Mystery Lady</h2>
      <p style="font-size:80px">💃</p>
      <p>"Hello there, sailor. Care for a little... company?"</p>`;
    
    if(hasProp) {
      html += `<button class="egg-btn" style="background:var(--success)" onclick="finishLarryEncounter(true)">Use 🧴 and proceed</button>`;
    } else {
      html += `<button class="egg-btn" style="background:var(--error)" onclick="finishLarryEncounter(false)">Proceed anyway...</button>`;
    }
    html += `<button class="egg-btn" onclick="openStore('leftys')">Nevermind</button>`;
    
    m.innerHTML = html;
  }

  window.finishLarryEncounter = (safe) => {
    if(safe) {
      let idx = inventory.findIndex(i => i && i.icon === '🧴');
      decrementItem(idx);
      player.xp += 500;
      logMsg("<span style='color:var(--success)'>You survived the encounter and gained 500 XP! Safety first!</span>");
      checkLevelUp();
      document.getElementById('overlay').style.display = 'none';
    } else {
      logMsg("<span style='color:var(--error)'>You caught an incurable social disease!</span>");
      document.getElementById('modal-content').innerHTML = `<h2>🤢 GAME OVER</h2><p>You should have visited Apu first. Safety is no accident.</p><button onclick="location.reload()">Restart</button>`;
      isDead = true; Sound.scream();
    }
  };

  function openStore(type = 'apu') {
    let o = document.getElementById('overlay');
    let m = document.getElementById('modal-content');
    let html = "";
    let items = [];

    if(type === 'apu') {
      let line = APU_LINES[Math.floor(Math.random()*APU_LINES.length)];
      html = `<h2>🏪 Apu's Mart</h2><p style="font-size: 120px; margin: 10px 0;">🧔🏿‍♂️</p><p>🧔🏿‍♂️ "${line}"</p>`;
      if(player.lastStoreFloor !== currentLevel) { player.storesVisited++; player.lastStoreFloor = currentLevel; }
      items = [
        {icon:'👜', name:'Small Bag', cost:20}, {icon:'📃', name:'Scroll of Identify', cost:30},
        {icon:'🔥', name:'Scroll of Fireball', cost:50}, {icon:'📘', name:'Tome of Fireball', cost:500},
        {icon:'🧴', name:'Prophylactic', cost:1}, {icon:'🍛', name:'Curry', cost:5}, 
        {icon:'🥤', name:'Slurpee', cost:5}, {icon:'🎩', name:'Top Hat', cost:200}
      ];
    } else if(type === 'leftys') {
      html = `<h2>🍺 Lefty's Bar</h2><p style="font-size: 80px; margin: 10px 0;">🍻</p><p>Lefty: "What'll it be, Larry? Uh, I mean, stranger?"</p>`;
      items = [
        {icon:'🥃', name:'Whiskey', cost:15}, {icon:'🍺', name:'Watered Down Beer', cost:5}
      ];
      html += `<button class="egg-btn" style="background:var(--secondary); color:black; margin-bottom:10px;" onclick="larryEncounter()">Talk to the Lady in the corner</button>`;
    } else if(type === 'bookstore') {
      html = `<h2>📚 The Ancient Tome</h2><p style="font-size: 80px; margin: 10px 0;">🧙‍♂️</p><p>Wizard: "Knowledge has a heavy price..."</p>`;
      items = [
        {icon:'⚡📘', name:'Tome of Lightning', cost:800}, {icon:'❄️📘', name:'Tome of Ice Bolt', cost:600},
        {icon:'💪📘', name:'Tome of Strength', cost:1000}, {icon:'🛡️📘', name:'Tome of Shield', cost:1000},
        {icon:'💖📘', name:'Tome of Heal', cost:1200}, {icon:'👟📘', name:'Tome of Haste', cost:1500}
      ];
    }

    Sound.gibberish();

    items.forEach(i => {
      html += `<div class="shop-item"><span>${i.icon} ${i.name} (${i.cost}g)</span> <button onclick="buy('${i.icon}', ${i.cost}, '${type}')">Buy</button></div>`;
    });

    html += `<hr><h3 style="margin:8px 0">Sell Items</h3>`;
    inventory.forEach((i, idx) => {
      if(i) {
        let def = ITEM_DEF[i.icon];
        if(def && def.maxGP > 0) {
          html += `<div class="shop-item"><span>${i.icon} ${def.name} (+${def.maxGP}g)</span> <button onclick="sell(${idx}, '${type}')">Sell</button></div>`;
        }
      }
    });

    if(type === 'apu' && player.storesVisited > 1) {
      html += `<button style="margin-top:16px; background:var(--secondary); color:var(--on-primary)" onclick="askApu()">Ask about his double...</button>`;
    }

    html += `<button style="margin-top:16px; background:var(--surface-container)" onclick="document.getElementById('overlay').style.display='none'; advanceTurn(1);">Leave</button>`;
    m.innerHTML = html; o.style.display = 'flex';
  }

  window.buy = (icon, cost, type) => {
    if(player.gp >= cost) {
      let emptyIdx = inventory.findIndex(i => i === null);
      if(emptyIdx !== -1) {
        if(icon === '🧴') { larryEasterEgg(0); return; }
        player.gp -= cost; inventory[emptyIdx] = {icon, qty:1};
        Sound.clink(); openStore(type); renderInventory(); updateUI();
      } else alert("Inventory Full!");
    } else alert("Not enough GP!");
  };

  window.sell = (idx, type) => {
    let item = inventory[idx];
    if(item) {
      let def = ITEM_DEF[item.icon];
      if(def && def.maxGP > 0) {
        player.gp += def.maxGP;
        Sound.clink(); decrementItem(idx); openStore(type); updateUI();
      }
    }
  };

  // SOURCE: src/render.js
  // === Renderer ===
  function calculateFOV() {
    for(let y=0; y<mapH; y++) visible[y].fill(false);
    let sightLimit = lightTurns > 0 ? 15 : 5;
    
    if(darkMap[player.y][player.x] && lightTurns <= 0) {
      visible[player.y][player.x] = true; explored[player.y][player.x] = true;
      return; 
    }

    visible[player.y][player.x] = true; explored[player.y][player.x] = true;

    for(let angle=0; angle<360; angle+=2) {
      let rad = angle * Math.PI / 180;
      let dx = Math.cos(rad), dy = Math.sin(rad);
      let cx = player.x + 0.5, cy = player.y + 0.5;

      for(let r=1; r<=sightLimit; r++) {
        cx += dx; cy += dy;
        let mapX = Math.floor(cx), mapY = Math.floor(cy);
        if(mapX < 0 || mapY < 0 || mapX >= mapW || mapY >= mapH) break;
        visible[mapY][mapX] = true; explored[mapY][mapX] = true;
        if(theMap[mapY][mapX] === TILES.WALL) break;
        if(darkMap[mapY][mapX] && lightTurns <= 0) break;
      }
    }
  function drawMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let cx = Math.floor(VIEW_COLS / 2), cy = Math.floor(VIEW_ROWS / 2);
    let wallColors = ['#4A4458', '#2e4536', '#45322e', '#2e3845', '#452e41'];
    let wCol = wallColors[(currentLevel - 1) % wallColors.length];

    for (let y = 0; y < VIEW_ROWS; y++) {
      let mapY = player.y + y - cy; 
      for (let x = 0; x < VIEW_COLS; x++) {
        let mapX = player.x + x - cx; 

        if (mapY >=0 && mapY < mapH && mapX >= 0 && mapX < mapW) {
          if (!explored[mapY][mapX]) continue;

          let tile = theMap[mapY][mapX];
          let isVis = visible[mapY][mapX];
          let isDark = darkMap[mapY][mapX];

          if(isVis) {
            let dist = Math.abs(mapX - player.x) + Math.abs(mapY - player.y);
            let opacity = 1.0;
            if(dist >= 4 && !lightTurns) { // Edge of 5-tile vision
               opacity = 0.4 + Math.random() * 0.2; // Dither/Flicker effect
            }

            if(tile === TILES.WALL) {
              ctx.fillStyle = wCol;
              ctx.globalAlpha = opacity;
              ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
              // Texture
              ctx.fillStyle = 'rgba(0,0,0,0.2)';
              ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, 2);
              ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE, 2);
              ctx.fillRect(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE, 2, TILE_SIZE/2);
              ctx.fillRect(x * TILE_SIZE + TILE_SIZE/4, y * TILE_SIZE + TILE_SIZE/2, 2, TILE_SIZE/2);
              ctx.globalAlpha = 1.0;
            }
            else if(tile === TILES.STAIR_UP) ctx.fillStyle = '#D0BCFF';
            else if(tile === TILES.STAIR_DOWN) ctx.fillStyle = '#F2B8B5';
            else if(tile === TILES.CHEST) ctx.fillStyle = '#ffb74d';
            else if(tile === TILES.STORE || tile === TILES.LEFTYS || tile === TILES.BOOKSTORE) ctx.fillStyle = '#4db6ac';
            else if(tile === TILES.WATER) ctx.fillStyle = '#2196F3';
            else {
              ctx.fillStyle = isDark && lightTurns <= 0 ? '#000' : '#312D3A';
              ctx.globalAlpha = opacity;
              ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
              // Floor texture
              if(!(isDark && lightTurns <= 0)) {
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                ctx.beginPath();
                ctx.arc(x * TILE_SIZE + TILE_SIZE/2, y * TILE_SIZE + TILE_SIZE/2, 2, 0, Math.PI*2);
                ctx.fill();
              }
              ctx.globalAlpha = 1.0;
            }
            if(tile !== TILES.WALL && tile !== TILES.FLOOR) ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          } else {
            if(tile === TILES.WALL) ctx.fillStyle = '#111';
            else ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          }
  ...
    ctx.font = '24px sans-serif';
    ctx.fillText(isDead ? '💀' : '🧍', cx * TILE_SIZE + 2, cy * TILE_SIZE + 24);

    // Damage Tint
    if(damageTint > 0) {
      ctx.fillStyle = `rgba(255, 0, 0, ${damageTint/20})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }
            let item = itemsOnGround.find(i => i.x === mapX && i.y === mapY);
            if(item) { ctx.font = '20px sans-serif'; ctx.fillText(item.icon, x * TILE_SIZE + 4, y * TILE_SIZE + 24); }
          }
          if(isVis && tile === TILES.CHEST) { ctx.font='20px sans-serif'; ctx.fillText('📦', x*TILE_SIZE+4, y*TILE_SIZE+24); }
          if(isVis && tile === TILES.STORE) { ctx.font='20px sans-serif'; ctx.fillText('🏪', x*TILE_SIZE+4, y*TILE_SIZE+24); }
          if(isVis && tile === TILES.STAIR_UP) { ctx.font='20px sans-serif'; ctx.fillText('⬆️', x*TILE_SIZE+4, y*TILE_SIZE+24); }
          if(isVis && tile === TILES.STAIR_DOWN) { ctx.font='20px sans-serif'; ctx.fillText('⬇️', x*TILE_SIZE+4, y*TILE_SIZE+24); }
        }
      }
    }

    enemies.forEach(enemy => {
      if(visible[enemy.y][enemy.x]) {
        let drawX = (enemy.x - player.x + cx) * TILE_SIZE;
        let drawY = (enemy.y - player.y + cy) * TILE_SIZE;
        let size = (enemy.type === 'genie') ? 48 : 24;
        let offset = (enemy.type === 'genie') ? -8 : 0;
        ctx.font = `${size}px sans-serif`; 
        ctx.fillText(enemy.stats.icon, drawX + 2 + offset, drawY + 24);
      }
    });

    ctx.font = '24px sans-serif';
    ctx.fillText(isDead ? '💀' : '🧍', cx * TILE_SIZE + 2, cy * TILE_SIZE + 24);
  }

  // SOURCE: src/input.js
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    let menu = document.getElementById('hamburger-menu');
    menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
  });

  document.addEventListener('keydown', function(event) {
    if(document.getElementById('overlay').style.display === 'flex') return;
    Sound.init();
    
    let key = event.key.toLowerCase();
    
    // Movement Rate Limiting
    const now = Date.now();
    const moveDelay = player.statusType === 'sugar' ? CONSTANTS.SUGAR_RUSH_SPEED : CONSTANTS.NORMAL_SPEED;
    if(['w', 'arrowup', 's', 'arrowdown', 'a', 'arrowleft', 'd', 'arrowright'].includes(key)) {
      if(now - lastMoveTime < moveDelay) return;
      lastMoveTime = now;
      
      if(player.statusType === 'freeze') {
        logMsg("You are frozen and cannot move!");
        return;
      }
      
      if(player.statusType === 'dizzy') {
        const dirs = ['w', 's', 'a', 'd'];
        key = dirs[Math.floor(Math.random() * dirs.length)];
      }
    }

    if(['w', 'arrowup'].includes(key)) movePlayer(0, -1);
    else if(['s', 'arrowdown'].includes(key)) movePlayer(0, 1);
    else if(['a', 'arrowleft'].includes(key)) movePlayer(-1, 0);
    else if(['d', 'arrowright'].includes(key)) movePlayer(1, 0);
    
    let num = parseInt(key);
    if(!isNaN(num)) { let idx = num === 0 ? 9 : num - 1; handleItemClick(idx); }
  });

  // === Boot Sequence ===
  window.onload = () => {
    try {
      initMap(50); calculateFOV(); renderInventory(); drawMap(); updateUI();
    } catch (err) {
      document.getElementById('log').innerHTML = `<span style="color:var(--error)">Fatal Boot Error: ${err.message}</span>`;
    }
  };
</script>
